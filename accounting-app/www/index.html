<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>项目记账本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;max-width:480px;margin:0 auto;min-height:100vh}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10}
.tab-bar button{flex:1;padding:14px 0;border:none;background:none;font-size:15px;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-bar button.active{color:#4A90D9;border-bottom-color:#4A90D9;font-weight:600}
.page{display:none;padding:16px}
.page.active{display:block}
h2{font-size:18px;margin-bottom:12px;color:#1a1a1a}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:#4A90D9;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-outline{background:#fff;color:#4A90D9;border:1px solid #4A90D9}
.btn-sm{padding:6px 12px;font-size:12px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;font-family:inherit}
textarea{resize:vertical;min-height:60px}
label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.flex-row{display:flex;gap:10px;align-items:center}
.flex-row>*{flex:1}
.flex-row .btn{flex:none}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-card .label{font-size:12px;color:#999;margin-bottom:6px}
.stat-card .value{font-size:22px;font-weight:700}
.stat-card .income{color:#27ae60}
.stat-card .expense{color:#e74c3c}
.stat-card .profit{color:#4A90D9}
.transaction-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.transaction-item:last-child{border-bottom:none}
.transaction-item .left{flex:1}
.transaction-item .title{font-size:15px;font-weight:500}
.transaction-item .meta{font-size:12px;color:#999;margin-top:2px}
.transaction-item .amount{font-size:17px;font-weight:600}
.amount-income{color:#27ae60}
.amount-expense{color:#e74c3c}
.project-item{padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.project-item:last-child{border-bottom:none}
.project-item .name{font-size:15px;font-weight:500}
.project-item .info{font-size:12px;color:#999;margin-top:2px}
.empty-state{text-align:center;padding:40px 16px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.chart-container{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:17px;margin-bottom:16px}
.modal .close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#999}
.type-toggle{display:flex;gap:0;margin-bottom:16px;background:#f0f0f0;border-radius:8px;overflow:hidden}
.type-toggle button{flex:1;padding:10px;border:none;background:none;font-size:14px;cursor:pointer;transition:all .2s}
.type-toggle button.active{background:#4A90D9;color:#fff}
.type-toggle button.income-btn.active{background:#27ae60}
.type-toggle button.expense-btn.active{background:#e74c3c}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-income{background:#e8f5e9;color:#27ae60}
.badge-expense{background:#fdecea;color:#e74c3c}
.action-btns{display:flex;gap:8px;margin-top:8px}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="active" onclick="switchTab('projects')">项目</button>
  <button onclick="switchTab('records')">流水</button>
  <button onclick="switchTab('stats')">统计</button>
  <button onclick="switchTab('settings')">设置</button>
</div>

<!-- 项目页 -->
<div id="projects" class="page active">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openProjectModal()">+ 新建项目</button>
  </div>
  <div id="project-list"></div>
</div>

<!-- 流水页 -->
<div id="records" class="page">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openTransactionModal()">+ 记一笔</button>
  </div>
  <div class="filter-bar">
    <select id="filter-project" onchange="renderTransactions()">
      <option value="">全部项目</option>
    </select>
    <select id="filter-month" onchange="renderTransactions()">
      <option value="">全部月份</option>
    </select>
  </div>
  <div id="transaction-list"></div>
</div>

<!-- 统计页 -->
<div id="stats" class="page">
  <div class="stat-grid">
    <div class="stat-card"><div class="label">总收入</div><div class="value income" id="stat-income">¥0</div></div>
    <div class="stat-card"><div class="label">总支出</div><div class="value expense" id="stat-expense">¥0</div></div>
    <div class="stat-card"><div class="label">净利润</div><div class="value profit" id="stat-profit">¥0</div></div>
    <div class="stat-card"><div class="label">项目数</div><div class="value" id="stat-projects">0</div></div>
  </div>
  <div class="chart-container">
    <h3 style="margin-bottom:12px">按项目统计</h3>
    <div id="project-chart"></div>
  </div>
  <div class="chart-container">
    <h3 style="margin-bottom:12px">按月统计</h3>
    <div id="month-chart"></div>
  </div>
</div>

<!-- 设置页 -->
<div id="settings" class="page">
  <div class="card">
    <h3 style="margin-bottom:12px">数据管理</h3>
    <div class="action-btns">
      <button class="btn btn-outline btn-sm" onclick="exportData()">导出备份</button>
      <button class="btn btn-outline btn-sm" onclick="importData()">导入恢复</button>
      <button class="btn btn-danger btn-sm" onclick="clearAll()">清空数据</button>
    </div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">关于</h3>
    <p style="font-size:13px;color:#666">项目记账本 v1.0<br>数据全部保存在手机本地，不联网不上传。</p>
  </div>
</div>

<script>
// ==================== 数据模型 ====================
const STORAGE_KEY_PROJECTS = 'acc_projects';
const STORAGE_KEY_TRANSACTIONS = 'acc_transactions';

function loadProjects(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_PROJECTS))||[]}catch(e){return[]}}
function saveProjects(data){localStorage.setItem(STORAGE_KEY_PROJECTS,JSON.stringify(data))}
function loadTransactions(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY_TRANSACTIONS))||[]}catch(e){return[]}}
function saveTransactions(data){localStorage.setItem(STORAGE_KEY_TRANSACTIONS,JSON.stringify(data))}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

// ==================== 当前状态 ====================
let currentTab='projects';
let editingProjectId=null;
let editingTransactionId=null;

// ==================== 页面切换 ====================
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelector(`.tab-bar button:nth-child(${['projects','records','stats','settings'].indexOf(tab)+1})`).classList.add('active');
  if(tab==='projects') renderProjects();
  if(tab==='records') renderTransactions();
  if(tab==='stats') renderStats();
}

// ==================== 项目管理 ====================
function renderProjects(){
  const projects=loadProjects();
  const transactions=loadTransactions();
  const container=document.getElementById('project-list');
  if(projects.length===0){
    container.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>还没有项目，点击上方按钮创建</p></div>`;
    return;
  }
  container.innerHTML=projects.map(p=>{
    const income=transactions.filter(t=>t.projectId===p.id&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=transactions.filter(t=>t.projectId===p.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const profit=income-expense;
    return `<div class="project-item" onclick="viewProject('${p.id}')">
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="info">${p.client?escapeHtml(p.client)+' · ':''}收入 ¥${income.toFixed(2)} · 支出 ¥${expense.toFixed(2)} · <span style="color:${profit>=0?'#27ae60':'#e74c3c'};font-weight:600">利润 ¥${profit.toFixed(2)}</span></div>
      <div class="action-btns">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openProjectModal('${p.id}')">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteProject('${p.id}')">删除</button>
      </div>
    </div>`;
  }).join('');
}

function openProjectModal(id){
  editingProjectId=id||null;
  const project=id?loadProjects().find(p=>p.id===id):null;
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.innerHTML=`<div class="modal">
    <button class="close" onclick="this.closest('.modal-overlay').remove()">×</button>
    <h3>${id?'编辑项目':'新建项目'}</h3>
    <label>项目名称 *</label>
    <input id="proj-name" value="${project?escapeHtml(project.name):''}" placeholder="例如：李总别墅设计">
    <label>客户名称</label>
    <input id="proj-client" value="${project?escapeHtml(project.client||''):''}" placeholder="客户姓名或公司">
    <label>预算金额</label>
    <input id="proj-budget" type="number" step="0.01" value="${project?project.budget||'':''}" placeholder="预计总收入">
    <label>备注</label>
    <textarea id="proj-note" placeholder="项目备注...">${project?escapeHtml(project.note||''):''}</textarea>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveProject()">保存</button>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',function(e){if(e.target===modal)modal.remove()});
}

function saveProject(){
  const name=document.getElementById('proj-name').value.trim();
  if(!name){alert('请输入项目名称');return}
  const projects=loadProjects();
  if(editingProjectId){
    const idx=projects.findIndex(p=>p.id===editingProjectId);
    if(idx>=0){
      projects[idx].name=name;
      projects[idx].client=document.getElementById('proj-client').value.trim();
      projects[idx].budget=parseFloat(document.getElementById('proj-budget').value)||0;
      projects[idx].note=document.getElementById('proj-note').value.trim();
    }
  }else{
    projects.push({
      id:genId(),
      name:name,
      client:document.getElementById('proj-client').value.trim(),
      budget:parseFloat(document.getElementById('proj-budget').value)||0,
      note:document.getElementById('proj-note').value.trim(),
      createdAt:new Date().toISOString()
    });
  }
  saveProjects(projects);
  renderProjects();
  document.querySelector('.modal-overlay')?.remove();
}

function deleteProject(id){
  if(!confirm('删除项目会同时删除该项目下的所有账目，确定吗？'))return;
  const projects=loadProjects().filter(p=>p.id!==id);
  const transactions=loadTransactions().filter(t=>t.projectId!==id);
  saveProjects(projects);
  saveTransactions(transactions);
  renderProjects();
}

function viewProject(id){
  const project=loadProjects().find(p=>p.id===id);
  if(!project)return;
  switchTab('records');
  document.getElementById('filter-project').value=id;
  renderTransactions();
}

// ==================== 账目管理 ====================
function renderTransactions(){
  const projects=loadProjects();
  let transactions=loadTransactions();
  const filterProject=document.getElementById('filter-project')?.value||'';
  const filterMonth=document.getElementById('filter-month')?.value||'';

  // 更新筛选下拉
  const projSelect=document.getElementById('filter-project');
  if(projSelect&&projSelect.options.length<=1){
    projSelect.innerHTML='<option value="">全部项目</option>'+projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  }

  // 更新月份筛选
  const monthSelect=document.getElementById('filter-month');
  const months=[...new Set(transactions.map(t=>t.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(monthSelect)monthSelect.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');

  if(filterProject)transactions=transactions.filter(t=>t.projectId===filterProject);
  if(filterMonth)transactions=transactions.filter(t=>t.date?.startsWith(filterMonth));

  const container=document.getElementById('transaction-list');
  if(transactions.length===0){
    container.innerHTML=`<div class="empty-state"><div class="icon">💰</div><p>还没有账目记录</p></div>`;
    return;
  }

  container.innerHTML=transactions.sort((a,b)=>b.date?.localeCompare(a.date||'')||0).map(t=>{
    const project=projects.find(p=>p.id===t.projectId);
    return `<div class="transaction-item">
      <div class="left">
        <div class="title">${escapeHtml(t.note||(t.type==='income'?'收入':'支出'))}</div>
        <div class="meta">${t.date?.slice(0,10)||''} · ${project?escapeHtml(project.name):'未知项目'} <span class="badge ${t.type==='income'?'badge-income':'badge-expense'}">${t.type==='income'?'收入':'支出'}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="amount ${t.type==='income'?'amount-income':'amount-expense'}">${t.type==='income'?'+':'-'}¥${t.amount.toFixed(2)}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteTransaction('${t.id}')" style="padding:4px 8px;font-size:11px">删</button>
      </div>
    </div>`;
  }).join('');
}

function openTransactionModal(){
  editingTransactionId=null;
  const projects=loadProjects();
  if(projects.length===0){alert('请先创建项目');return}
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.innerHTML=`<div class="modal">
    <button class="close" onclick="this.closest('.modal-overlay').remove()">×</button>
    <h3>记一笔</h3>
    <div class="type-toggle">
      <button class="income-btn active" onclick="setType('income',this)">收入</button>
      <button class="expense-btn" onclick="setType('expense',this)">支出</button>
    </div>
    <input type="hidden" id="txn-type" value="income">
    <label>项目</label>
    <select id="txn-project">${projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}</select>
    <label>金额 *</label>
    <input id="txn-amount" type="number" step="0.01" placeholder="0.00">
    <label>日期</label>
    <input id="txn-date" type="date" value="${new Date().toISOString().slice(0,10)}">
    <label>备注</label>
    <input id="txn-note" placeholder="设计费、材料费...">
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveTransaction()">保存</button>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',function(e){if(e.target===modal)modal.remove()});
}

function setType(type,btn){
  document.getElementById('txn-type').value=type;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function saveTransaction(){
  const amount=parseFloat(document.getElementById('txn-amount').value);
  if(!amount||amount<=0){alert('请输入有效金额');return}
  const transactions=loadTransactions();
  transactions.push({
    id:genId(),
    projectId:document.getElementById('txn-project').value,
    type:document.getElementById('txn-type').value,
    amount:amount,
    date:document.getElementById('txn-date').value,
    note:document.getElementById('txn-note').value.trim(),
    createdAt:new Date().toISOString()
  });
  saveTransactions(transactions);
  renderTransactions();
  document.querySelector('.modal-overlay')?.remove();
}

function deleteTransaction(id){
  if(!confirm('确定删除这条记录？'))return;
  saveTransactions(loadTransactions().filter(t=>t.id!==id));
  renderTransactions();
}

// ==================== 统计 ====================
function renderStats(){
  const projects=loadProjects();
  const transactions=loadTransactions();

  const totalIncome=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  document.getElementById('stat-income').textContent='¥'+totalIncome.toFixed(2);
  document.getElementById('stat-expense').textContent='¥'+totalExpense.toFixed(2);
  document.getElementById('stat-profit').textContent='¥'+(totalIncome-totalExpense).toFixed(2);
  document.getElementById('stat-projects').textContent=projects.length;

  // 按项目统计
  const projectStats=projects.map(p=>{
    const income=transactions.filter(t=>t.projectId===p.id&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=transactions.filter(t=>t.projectId===p.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return{name:p.name,income,expense,profit:income-expense};
  }).filter(s=>s.income>0||s.expense>0);

  const projectChart=document.getElementById('project-chart');
  if(projectStats.length===0){
    projectChart.innerHTML='<p style="color:#999;text-align:center">暂无数据</p>';
  }else{
    const maxVal=Math.max(...projectStats.map(s=>Math.max(s.income,s.expense)),1);
    projectChart.innerHTML=projectStats.map(s=>{
      const inW=(s.income/maxVal*100).toFixed(1);
      const exW=(s.expense/maxVal*100).toFixed(1);
      const pfW=Math.abs(s.profit/maxVal*100).toFixed(1);
      return `<div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px">${escapeHtml(s.name)} <span style="color:${s.profit>=0?'#27ae60':'#e74c3c'}">¥${s.profit.toFixed(2)}</span></div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px">
          <span style="color:#27ae60;min-width:36px">收 ¥${s.income.toFixed(0)}</span>
          <div style="flex:1;height:16px;background:#e8f5e9;border-radius:4px;overflow:hidden"><div style="width:${inW}%;height:100%;background:#27ae60;border-radius:4px"></div></div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-top:2px">
          <span style="color:#e74c3c;min-width:36px">支 ¥${s.expense.toFixed(0)}</span>
          <div style="flex:1;height:16px;background:#fdecea;border-radius:4px;overflow-hidden"><div style="width:${exW}%;height:100%;background:#e74c3c;border-radius:4px"></div></div>
        </div>
      </div>`;
    }).join('');
  }

  // 按月统计
  const monthMap={};
  transactions.forEach(t=>{
    const m=t.date?.slice(0,7);
    if(!m)return;
    if(!monthMap[m])monthMap[m]={income:0,expense:0};
    if(t.type==='income')monthMap[m].income+=t.amount;
    else monthMap[m].expense+=t.amount;
  });
  const monthKeys=Object.keys(monthMap).sort().reverse().slice(0,12);

  const monthChart=document.getElementById('month-chart');
  if(monthKeys.length===0){
    monthChart.innerHTML='<p style="color:#999;text-align:center">暂无数据</p>';
  }else{
    const maxM=Math.max(...monthKeys.map(m=>Math.max(monthMap[m].income,monthMap[m].expense)),1);
    monthChart.innerHTML=monthKeys.map(m=>{
      const d=monthMap[m];
      const inW=(d.income/maxM*100).toFixed(1);
      const exW=(d.expense/maxM*100).toFixed(1);
      const pf=d.income-d.expense;
      return `<div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px">${m} <span style="color:${pf>=0?'#27ae60':'#e74c3c'}">¥${pf.toFixed(2)}</span></div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px">
          <span style="color:#27ae60;min-width:36px">收 ¥${d.income.toFixed(0)}</span>
          <div style="flex:1;height:16px;background:#e8f5e9;border-radius:4px;overflow:hidden"><div style="width:${inW}%;height:100%;background:#27ae60;border-radius:4px"></div></div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-top:2px">
          <span style="color:#e74c3c;min-width:36px">支 ¥${d.expense.toFixed(0)}</span>
          <div style="flex:1;height:16px;background:#fdecea;border-radius:4px;overflow:hidden"><div style="width:${exW}%;height:100%;background:#e74c3c;border-radius:4px"></div></div>
        </div>
      </div>`;
    }).join('');
  }
}

// ==================== 数据管理 ====================
function exportData(){
  const data={
    projects:loadProjects(),
    transactions:loadTransactions(),
    exportedAt:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`记账备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('导出成功！');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(){
    const file=this.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=JSON.parse(e.target.result);
        if(!data.projects||!data.transactions){throw new Error('格式错误')}
        if(!confirm(`即将导入 ${data.projects.length} 个项目、${data.transactions.length} 条账目，会覆盖当前数据。确定吗？`))return;
        saveProjects(data.projects);
        saveTransactions(data.transactions);
        alert('导入成功！');
        switchTab(currentTab);
      }catch(err){alert('文件格式不正确，请选择有效的备份文件')}
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAll(){
  if(!confirm('⚠️ 确定要清空所有项目和账目数据吗？此操作不可恢复！'))return;
  if(!confirm('再次确认：真的要删除全部数据吗？'))return;
  localStorage.removeItem(STORAGE_KEY_PROJECTS);
  localStorage.removeItem(STORAGE_KEY_TRANSACTIONS);
  alert('数据已清空');
  switchTab(currentTab);
}

function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

// ==================== 启动 ====================
renderProjects();
</script>
</body>
</html>
