
<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="keywords" content="云开发,cloudbase,weda,微搭,工作台,云后台" />
    <meta name="description" content="云开发·云后台,企业工作台" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* #root {
        background: #e3e6eb;
      } */

      #loading,
      .page-loading {
        position: absolute;
        left: 50%;
        top: 50%;
        bottom: 0;
        right: 0;
        transform: translate(-50%, -50%);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        height: 100%;
        cursor: pointer;
        font-size: 14px;
      }

      .dot {
        position: relative;
        display: inline-block;
        font-size: 32px;
        width: 1em;
        height: 1em;
        transform: rotateZ(45deg);
        transition: transform 0.3s cubic-bezier(0.78, 0.14, 0.15, 0.86);
        animation: Rotate45 1.2s infinite linear;
      }

      .dot > i {
        height: 14px;
        width: 14px;
        background-color: #0052d9;
        display: block;
        position: absolute;
        border-radius: 100%;
        transform: scale(0.75);
        transform-origin: 50% 50%;
        opacity: 0.3;
        animation: myAnimationMove 1s infinite linear alternate;
      }

      .dot:nth-child(1) {
        top: 0;
        left: 0;
      }

      .dot :nth-child(2) {
        top: 0;
        right: 0;
        animation-delay: 0.4s;
      }

      .dot :nth-child(3) {
        bottom: 0;
        right: 0;
        animation-delay: 0.8s;
      }

      .dot :nth-child(4) {
        left: 0;
        bottom: 0;
        animation-delay: 1.2s;
      }

      @keyframes Rotate45 {
        to {
          transform: rotate(405deg);
        }
      }

      @keyframes myAnimationMove {
        to {
          opacity: 1;
        }
      }
    </style>
    <script>
      window.routerBase = '/';
    </script>
    <script>
      //! umi version: 3.5.20
    </script>
  </head>

  <body>
    <div id="root"></div>
    <div class="page-loading" id="loading">
      <div class="dot">
        <i></i>
        <i></i>
        <i></i>
        <i></i>
      </div>
    </div>

    <script>
      window.WedaPortalConfig = {
        envId: 'jizhang-d1gzkty4fa360a02c',
      };
    </script>
    <script src="https://weda.cloud.tencent.com/workbench/rainbowConfig.js"></script>

    <script>
      [...document.querySelectorAll('.page-loading')].forEach((el) => (el.style.display = 'none'));
    </script>
  </body>
</html>
